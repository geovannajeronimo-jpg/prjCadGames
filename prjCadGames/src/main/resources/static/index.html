<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro e Pesquisa de Jogos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Cadastro e Pesquisa de Jogos</h1>

<div id="cadastro">

    <h2>Cadastro de Jogo</h2>

    <form id="cadastroForm">

        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required>
        <br>

        <label for="platform">Plataforma:</label>
        <input type="text" id="platform" name="platform" required>
        <br>

        <label for="price">Preço:</label>
        <input type="number" id="price" name="price" step="0.01" required>
        <br>

        <label for="category">Categoria:</label>
        <input type="text" id="category" name="category" required>
        <br>

        <label class="label-file">
            Escolha uma imagem
            <input type="file" id="thumbnail" name="thumbnail" accept=".jpg, .jpeg, .png" required>
        </label>

        <br><br>

        <button type="submit">Cadastrar</button>

    </form>

</div>


<div id="pesquisa">

    <h2>Pesquisa de Jogo</h2>

    <form id="pesquisaForm">

        <label for="searchId">ID do Jogo:</label>
        <input type="number" id="searchId" name="searchId">

        <br><br>

        <button type="button" onclick="pesquisarJogo()">Pesquisar</button>
        <button type="button" onclick="excluirJogo()">Excluir</button>

    </form>

    <div id="resultadoPesquisa"></div>

</div>

<script src="script.js"></script>

</body>
</html>
